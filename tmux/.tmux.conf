# True color support (required for Neovim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reduce escape delay (critical for Neovim responsiveness)
set -sg escape-time 10

# Pass focus events through to applications like Neovim
set -g focus-events on

# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Mouse support (click to select pane/window, scroll, resize)
set -g mouse on

# Don't rename windows automatically once you've named them
set -g allow-rename off

# Vi keys in copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Intuitive splits that keep the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (no prefix needed with -n? no — keep prefix for safety)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with capital HJKL
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Reload config in place
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Status bar
set -g status-interval 5
set -g status-position bottom
set -g status-style "fg=white,bg=default"
set -g status-left "[#S] "
set -g status-left-length 20
set -g status-right "%H:%M %d-%b"
set -g status-right-length 20
set -g window-status-current-style "fg=yellow,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Pane border style
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour75"

# Slightly more visible message display
set -g display-time 2000
